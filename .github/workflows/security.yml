name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify no .env files are tracked
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "ERROR: Tracked .env file detected in repository index!"
            exit 1
          fi

      - name: Verify no cache or build artifacts are tracked
        run: |
          if git ls-files | grep -E '(__pycache__|\.pyc|\.pytest_cache|\.ruff_cache|node_modules|dist|build|\.next)'; then
            echo "ERROR: Tracked cache or build output folder detected in repository index!"
            exit 1
          fi

      - name: Scan for obvious hardcoded credentials
        run: |
          # Exclude documentation files and directories containing build context or virtualenvs
          # to prevent false positives from mock keys in API guides.
          if grep -RInE 'AIza[0-9A-Za-z_-]{20,}|sk-[0-9A-Za-z]{20,}|ghp_[0-9A-Za-z]{20,}|github_pat_[0-9A-Za-z_]{20,}|BEGIN PRIVATE KEY' . \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude-dir=web/node_modules \
            --exclude-dir=node_modules \
            --exclude-dir=web/dist \
            --exclude-dir=dist \
            --exclude-dir=build \
            --exclude=api_examples.md \
            --exclude=README.md \
            --exclude=test_security_hygiene.py \
            --exclude=security_review/SKILL.md; then
            echo "ERROR: Potential hardcoded secret or private key found!"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run safety and security tests
        run: |
          python -m pytest tests/test_security_hygiene.py tests/test_safety.py tests/test_safety_tools.py tests/test_recommend_safety_api.py
